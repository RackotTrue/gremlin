# =============================================================================
# Форма активации гарантии
# =============================================================================
# Это конфигурация формы для Form Engine.
# Для создания новой формы скопируйте этот файл и измените под свои нужды.
# =============================================================================

form_id: "activation"
title: "Активация гарантии"
description: |
  Для активации гарантии вам необходимо уточнить несколько параметров:
  🔻 _Согласие на обработку ПДн_
  🔻 _Согласие на маркетинговые коммуникации_
  🔻 _Фамилия_
  🔻 _Имя_
  🔻 _Номер телефона_
  🔻 _Email_
  🔻 _Город/регион_
  🔻 _Источник заказа_

version: "1.0"

# =============================================================================
# Шаги формы
# =============================================================================
steps:
  # ---------------------------------------------------------------------------
  # 1. Согласие на обработку персональных данных
  # ---------------------------------------------------------------------------
  - id: "pd_consent"
    type: "consent"
    label: "📋 *Согласие на обработку персональных данных*"
    required: true
    consent_text: |
      Для продолжения необходимо дать согласие на обработку персональных данных.
      
      Нажимая кнопку «Согласен», вы подтверждаете своё согласие на обработку 
      персональных данных в соответствии с Федеральным законом №152-ФЗ 
      «О персональных данных».
    agree_button: "Согласен ✅"

  # ---------------------------------------------------------------------------
  # 2. Согласие на маркетинговые коммуникации
  # ---------------------------------------------------------------------------
  - id: "marketing_consent"
    type: "consent"
    label: "📢 *Согласие на маркетинговые коммуникации*"
    required: true
    consent_text: |
      Для получения информации об акциях, специальных предложениях и новостях 
      компании по email, SMS, мессенджерам и телефону, нажмите кнопку «Согласен».
    agree_button: "Согласен ✅"

  # ---------------------------------------------------------------------------
  # 3. Фамилия
  # ---------------------------------------------------------------------------
  - id: "surname"
    type: "text"
    label: "Введите вашу _фамилию_"
    required: true
    hint: "✅ Спасибо! Теперь заполним ваши данные."
    validation:
      min_len: 2
      max_len: 50
      regex: "^[A-Za-zА-Яа-яЁё]+(?:-[A-Za-zА-Яа-яЁё]+)*$"
      error_message: "Фамилия должна содержать только буквы и допускается дефис"

  # ---------------------------------------------------------------------------
  # 4. Имя
  # ---------------------------------------------------------------------------
  - id: "name"
    type: "text"
    label: "Введите ваше _имя_"
    required: true
    validation:
      min_len: 2
      max_len: 50
      regex: "^[A-Za-zА-Яа-яЁё]+(?:-[A-Za-zА-Яа-яЁё]+)*$"
      error_message: "Имя должно содержать только буквы и допускается дефис"

  # ---------------------------------------------------------------------------
  # 5. Телефон
  # ---------------------------------------------------------------------------
  - id: "phone"
    type: "phone"
    label: "Введите ваш _номер телефона_"
    required: true
    hint: "Номер должен начинаться с +7, без пробелов и спец символов, и содержать 11 цифр"
    validation:
      error_message: "Введите корректный номер телефона в формате +7XXXXXXXXXX"

  # ---------------------------------------------------------------------------
  # 6. Email
  # ---------------------------------------------------------------------------
  - id: "email"
    type: "email"
    label: "Введите ваш _Email_"
    required: true
    hint: "Email должен быть в формате: example@mail.com"
    validation:
      error_message: "Введите корректный email адрес"

  # ---------------------------------------------------------------------------
  # 7. Проверочный код email
  # ---------------------------------------------------------------------------
  - id: "email_code"
    type: "email_verification"
    label: "Введите код подтверждения из письма"
    required: true
    verification_message: |
      На указанный электронный адрес было отправлено письмо с кодом подтверждения.
      Если письмо не пришло, проверьте папку спам.
      
      Пожалуйста введите код подтверждения из письма:
    validation:
      error_message: "Код должен содержать 4-6 цифр"

  # ---------------------------------------------------------------------------
  # 8. Город
  # ---------------------------------------------------------------------------
  - id: "city"
    type: "text"
    label: "🏙 Введите ваш _город или регион_ проживания"
    required: true
    validation:
      min_len: 2
      max_len: 100
      error_message: "Название города слишком короткое. Введите корректный город."

  # ---------------------------------------------------------------------------
  # 9. Источник заказа (маркетплейс)
  # ---------------------------------------------------------------------------
  - id: "order_source"
    type: "select"
    label: "🛒 Выберите _источник заказа_ (где вы приобрели товар)"
    required: true
    options_map:
      ozon: "Ozon"
      wb: "Wildberries"
      ym: "Яндекс Маркет"
      avito: "Avito"
      retail: "Розничный магазин"

  # ---------------------------------------------------------------------------
  # 10. Купленный товар
  # ---------------------------------------------------------------------------
  # Идентификаторы товаров совпадают с id героев в heroes.yml —
  # благодаря этому мы можем «оживить» соответствующую картинку в видео-открытке.
  - id: "product"
    type: "select"
    label: "🎁 *Какой товар вы купили?*"
    hint: "Выбор товара нужен, чтобы подготовить персональное поздравление для ребёнка."
    required: true
    options_map:
      tent_house: "Палатка «Домик» 🏠"
      tent_3in1: "Палатка «3 в 1» ⛺"
      tent_shater: "Палатка «Шатёр» 🏕"
      constructor: "Конструктор 🧱"
      box_trainer: "Тренажёр для бокса 🥊"
      night_light: "Ночник 💡"
      toy_car: "Машинка 🚗"

# =============================================================================
# Настройки экрана проверки данных
# =============================================================================
review:
  enabled: true
  title: "📋 Проверьте введённые данные"
  edit_button: "✏️ Изменить"
  confirm_button: "✅ Подтвердить и отправить"

# =============================================================================
# Настройки отправки
# =============================================================================
submit:
  button_text: "✅ Подтвердить и отправить"
  success_text: |
    ✅ *Спасибо за активацию гарантии!*
    
    Благодарим Вас за покупку и регистрацию гарантии!
    
    ⚠️ *Важно!* Если при монтаже шины на диск есть подозрение на заводской брак 
    (например, шина не балансируется или имеет ярко выраженное отклонение от оси вращения), 
    рекомендуем не эксплуатировать такую шину и сразу обратиться к нам в этом чате — 
    это упростит и ускорит процедуру возврата денежных средств.
  fail_text: "❌ Не удалось отправить данные. Пожалуйста, попробуйте еще раз или обратитесь в поддержку."

# =============================================================================
# Тексты кнопок навигации
# =============================================================================
buttons:
  back: "⬅️ Назад"
  cancel: "❌ Отмена"
  restart: "🔄 Начать заново"
  skip: "⏭ Пропустить"
