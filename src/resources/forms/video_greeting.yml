# =============================================================================
# Форма видео-открытки (MVP)
# =============================================================================
# Родитель заполняет данные → выбирает героя → вводит текст поздравления
# Бот отправляет запрос в fal.ai, после генерации присылает видео.
# =============================================================================

form_id: "video_greeting"
title: "Видео-открытка для ребёнка"
description: |
  Создайте бесплатную видео-открытку — выбранный герой скажет вашему ребёнку то, что вы напишете.
  Обычно генерация занимает 2–5 минут.

version: "1.0"

# =============================================================================
# Шаги формы
# =============================================================================
steps:
  # ---------------------------------------------------------------------------
  # 1. Согласие на обработку ПДн
  # ---------------------------------------------------------------------------
  - id: "pd_consent"
    type: "consent"
    label: "📋 *Согласие на обработку персональных данных*"
    required: true
    consent_text: |
      Продолжая, вы даёте согласие на обработку персональных данных 
      для создания и отправки видео-открытки, а также для дальнейших 
      сообщений от бота (напоминания, поздравления).
    agree_button: "Согласен ✅"

  # ---------------------------------------------------------------------------
  # 2. Имя родителя
  # ---------------------------------------------------------------------------
  - id: "buyer_name"
    type: "text"
    label: "Как вас зовут?"
    required: true
    validation:
      min_len: 2
      max_len: 50
      error_message: "Введите имя от 2 до 50 символов"

  # ---------------------------------------------------------------------------
  # 3. Телефон
  # ---------------------------------------------------------------------------
  - id: "phone"
    type: "phone"
    label: "Ваш номер телефона"
    required: true
    hint: "Нажмите кнопку «Поделиться номером телефона» внизу экрана"
    validation:
      error_message: "Введите корректный номер в формате +7XXXXXXXXXX"

  # ---------------------------------------------------------------------------
  # 4. Имя ребёнка
  # ---------------------------------------------------------------------------
  - id: "child_name"
    type: "text"
    label: "Как зовут ребёнка, которому предназначается открытка?"
    required: true
    hint: "Короче имя — больше места для текста поздравления (лимит ~10 сек озвучки)."
    validation:
      min_len: 2
      max_len: 50
      error_message: "Введите имя ребёнка (2–50 символов)"

  # ---------------------------------------------------------------------------
  # 5. Выбор героя
  # ---------------------------------------------------------------------------
  - id: "hero_id"
    type: "select"
    label: "👾 *Кто будет поздравлять?*"
    required: true
    options_map:
      gremlin: "Гремлин 👾"

  # ---------------------------------------------------------------------------
  # 6. Текст поздравления
  # ---------------------------------------------------------------------------
  - id: "message_text"
    type: "text"
    label: "Напишите, что герой должен сказать ребёнку"
    required: true
    hint: |
      Короткая реплика: до ~130 символов (вместе с «Привет, имя!» лимит ~10 секунд озвучки).
      Пример: «Поздравляю с днём рождения! Будь здоров и слушайся родителей.»
    validation:
      min_len: 10
      max_len: 130
      error_message: "Текст от 10 до 130 символов (лимит озвучки ~10 сек)"

# =============================================================================
# Проверка данных
# =============================================================================
review:
  enabled: true
  title: "📋 Проверьте данные перед генерацией"
  edit_button: "✏️ Изменить"
  confirm_button: "🎬 Создать видео"

# =============================================================================
# Настройки отправки
# =============================================================================
submit:
  button_text: "🎬 Создать видео-открытку"
  success_text: |
    ✅ *Спасибо!*
    
    Ваша видео-открытка в очереди на генерацию. Обычно это занимает 2–5 минут.
    
    Как только видео будет готово, мы пришлём его сюда.
  fail_text: "❌ Не удалось создать задачу. Попробуйте позже."

buttons:
  back: "⬅️ Назад"
  cancel: "❌ Отмена"
  restart: "🔄 Начать заново"
  skip: "⏭ Пропустить"
